{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Win Cash</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #0b2c66;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding-top: 40px;
        }

        img {
            width: 300px;
            max-width: 90%;
        }

        .bottom-btn {
            margin-bottom: 40px;
        }

        button {
            background-color: #ff007f;
            color: white;
            font-size: 18px;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e60073;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Image -->
        <img src="{% static 'images/image.png' %}" alt="Win Cash">
    </div>

    <!-- Button -->
    <div class="bottom-btn">
        <a href="{% url 'page2' %}">
            <button>Click to Win Real Cash</button>
        </a>
    </div>

</body>
</html>
